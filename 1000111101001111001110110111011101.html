<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikace nedostupná</title>
    <style>
        /* Načtení elegantního tenkého fontu z Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #050505; /* Hluboká černá */
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden; /* Zabránění scrollování */
        }

        .message-container {
            padding: 24px;
            /* Jemná animace pro plynulý nástup textu */
            animation: fadeIn 1.2s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        h1 {
            /* Responzivní velikost - přizpůsobí se mobilu i PC */
            font-size: clamp(22px, 4vw, 32px); 
            font-weight: 300; /* Tenký, elegantní řez písma */
            letter-spacing: 1.5px;
            margin: 0;
            color: rgba(255, 255, 255, 0.9); /* O něco jemnější než čistá bílá */
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="message-container">
        <h1>Tato aplikace není momentálně dostupná.</h1>
    </div>

</body>
</html>
